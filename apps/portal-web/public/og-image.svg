<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08122A"/>
      <stop offset="100%" style="stop-color:#0D1B3E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow -->
  <circle cx="900" cy="315" r="300" fill="rgba(37,99,235,0.12)"/>
  <!-- Logo hexagon -->
  <polygon points="200,250 240,227 280,250 280,296 240,319 200,296"
    fill="none" stroke="#94A3B8" stroke-width="8" stroke-linejoin="round"/>
  <text x="240" y="280" text-anchor="middle" dominant-baseline="middle"
    font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#94A3B8">ạ</text>
  <!-- Title -->
  <text x="320" y="275" font-family="'Sora',Arial,sans-serif" font-size="52" font-weight="800" fill="white">Ạ</text>
  <text x="320" y="310" font-family="'Sora',Arial,sans-serif" font-size="18" font-weight="400" fill="#94A3B8" letter-spacing="2">AI Management Assistant</text>
  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="'Pretendard',Arial,sans-serif" font-size="28" font-weight="600" fill="#CBD5E1">사람은 WHAT, AI는 HOW</text>
  <text x="600" y="460" text-anchor="middle" font-family="'Pretendard',Arial,sans-serif" font-size="18" fill="#64748B">글로벌 협업 엔터프라이즈 플랫폼</text>
  <!-- Bottom accent line -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#accent)"/>
  <!-- Domain -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#475569">www.amoeba.site</text>
</svg>
