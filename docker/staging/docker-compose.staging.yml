version: '3.8'

services:
  amb-postgres:
    image: postgres:15-alpine
    container_name: amb-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - amb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  amb-api:
    build:
      context: ../../
      dockerfile: docker/staging/Dockerfile.api
    container_name: amb-api-staging
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      TZ: UTC
      API_PORT: ${API_PORT:-3019}
      API_PREFIX: ${API_PREFIX:-api/v1}
      DB_HOST: ${DB_HOST:-amb-postgres}
      DB_PORT: ${DB_PORT:-5442}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      PORTAL_BRIDGE_INTERNAL_TOKEN: ${PORTAL_BRIDGE_INTERNAL_TOKEN:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GOOGLE_SERVICE_ACCOUNT_KEY_PATH: ${GOOGLE_SERVICE_ACCOUNT_KEY_PATH:-}
      GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${GOOGLE_SERVICE_ACCOUNT_KEY_JSON:-}
      GOOGLE_DRIVE_IMPERSONATE_EMAIL: ${GOOGLE_DRIVE_IMPERSONATE_EMAIL:-}
      GOOGLE_DRIVE_BILLING_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_BILLING_ROOT_FOLDER_ID:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@amoeba.com}
      # AmoebaTalk Integration
      AMB_ATK_SHARED_SECRET: ${AMB_ATK_SHARED_SECRET:-}
      AMB_ATK_CONNECT_URL: ${AMB_ATK_CONNECT_URL:-}
      AMB_ATK_API_URL: ${AMB_ATK_API_URL:-}
      AMB_ATK_API_KEY: ${AMB_ATK_API_KEY:-}
    volumes:
      - api_uploads:/app/apps/api/uploads
    depends_on:
      amb-postgres:
        condition: service_healthy
    networks:
      - amb-network

  amb-web:
    build:
      context: ../../
      dockerfile: docker/staging/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
        VITE_ATK_ORIGIN: ${VITE_ATK_ORIGIN:-}
        VITE_ATK_URL: ${VITE_ATK_URL:-}
    container_name: amb-web-staging
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - amb-api
    networks:
      - amb-network

  amb-portal-api:
    build:
      context: ../../
      dockerfile: docker/staging/Dockerfile.portal-api
    container_name: amb-portal-api-staging
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${PORTAL_API_PORT:-3020}
      API_PREFIX: ${API_PREFIX:-api/v1}
      DB_HOST: ${DB_HOST:-amb-postgres}
      DB_PORT: ${DB_PORT:-5442}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${PORTAL_JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${PORTAL_JWT_ACCESS_EXPIRATION:-30m}
      JWT_REFRESH_EXPIRATION: ${PORTAL_JWT_REFRESH_EXPIRATION:-14d}
      CORS_ORIGINS: ${PORTAL_CORS_ORIGINS}
      FRONTEND_URL: ${PORTAL_FRONTEND_URL}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${PORTAL_SMTP_FROM:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      AMA_API_URL: ${AMA_API_URL:-}
      AMA_LOGIN_URL: ${AMA_LOGIN_URL:-}
      PORTAL_BRIDGE_INTERNAL_TOKEN: ${PORTAL_BRIDGE_INTERNAL_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      PORTAL_URL: ${PORTAL_URL:-}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:-}
    depends_on:
      amb-postgres:
        condition: service_healthy
    networks:
      - amb-network

  amb-portal-web:
    build:
      context: ../../
      dockerfile: docker/staging/Dockerfile.portal-web
      args:
        VITE_API_BASE_URL: ${PORTAL_VITE_API_BASE_URL}
    container_name: amb-portal-web-staging
    restart: unless-stopped
    ports:
      - "8099:80"
    depends_on:
      - amb-portal-api
    networks:
      - amb-network

networks:
  amb-network:
    driver: bridge

volumes:
  postgres_data:
  api_uploads:
