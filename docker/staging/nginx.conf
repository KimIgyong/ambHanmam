server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent mixed-content on HTTPS behind reverse proxy
    absolute_redirect off;

    # Merge duplicate slashes and redirect
    merge_slashes on;
    if ($request_uri ~ "^[^?]*?//") {
        rewrite "^" $scheme://$host$uri permanent;
    }

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors 'self' *.hanmam.kr" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # client upload limit
    client_max_body_size 50M;

    # API reverse proxy (^~ prevents regex locations from overriding)
    location ^~ /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream http://amb-api:3019;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE support
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # SPA fallback (no $uri/ to avoid serving Vite's dist/assets/ directory)
    location / {
        try_files $uri /index.html;
    }

    # Service worker + manifest: no cache
    location ~* (sw\.js|push-sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
